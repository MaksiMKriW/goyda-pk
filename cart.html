<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoydaPK — Корзина</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="content">
    <header class="page-header">
      <div class="logo-area">
        <a href="index.html">
          <i class="fas fa-microchip logo-icon"></i>
          <div class="logo-text">Goyda<span>PK</span></div>
        </a>
      </div>
      <div class="contact-info">
        <span><i class="fas fa-phone-alt"></i> 8 (800) 555-35-35</span>
        <span><i class="fas fa-envelope"></i> info@goyda.pk</span>
      </div>
      <nav class="main-nav">
        <ul>
          <li><a href="index.html">Главная</a></li>
          <li><a href="catalog.html">Каталог</a></li>
          <li><a href="about.html">О нас</a></li>
          <li><a href="contacts.html">Контакты</a></li>
          <li><a href="profile.html">Профиль</a></li>
        </ul>
      </nav>
      <div class="header-icons">
        <a href="profile.html"><i class="fas fa-user"></i></a>
        <a href="cart.html"><i class="fas fa-shopping-cart"></i><span class="cart-badge">0</span></a>
      </div>
    </header>

    <main class="container">
      <h1 class="section-title">
        <span class="title-gradient">Корзина</span>
      </h1>
      
      <div class="cart-wrapper glass">
        <div class="cart-header">
          <div>Товар</div>
          <div>Цена</div>
          <div>Количество</div>
          <div>Сумма</div>
          <div></div>
        </div>
        <div id="cartItems"></div>
        <div class="cart-footer">
          <div class="cart-summary glass">
            <div class="summary-row">
              <span>Товаров:</span>
              <span class="summary-value items-count">0</span>
            </div>
            <div class="summary-row">
              <span>Сумма:</span>
              <span class="summary-value cart-subtotal">0 ₽</span>
            </div>
            <div class="summary-row total">
              <span>Итого:</span>
              <span class="summary-value cart-total">0 ₽</span>
            </div>
            <button class="btn-checkout-small">Оформить заказ →</button>
          </div>
        </div>
      </div>
    </main>

    <footer class="page-footer">
      <div class="footer-copy">© 2026 GoydaPK | Криворотов М.В, Мартиросов В.В</div>
      <div class="footer-social">
        <a href="#" class="social-icon"><i class="fab fa-vk"></i></a>
        <a href="#" class="social-icon"><i class="fab fa-telegram"></i></a>
        <a href="#" class="social-icon"><i class="fab fa-youtube"></i></a>
      </div>
    </footer>
  </div>

  <script src="javascript.js"></script>
</body>
</html>
