<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoydaPK — Профиль</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="content">
    <header class="page-header">
      <div class="logo-area">
        <a href="index.html">
          <i class="fas fa-microchip logo-icon"></i>
          <div class="logo-text">Goyda<span>PK</span></div>
        </a>
      </div>
      <div class="contact-info">
        <span><i class="fas fa-phone-alt"></i> 8 (800) 555-35-35</span>
        <span><i class="fas fa-envelope"></i> info@goyda.pk</span>
      </div>
      <nav class="main-nav">
        <ul>
          <li><a href="index.html">Главная</a></li>
          <li><a href="catalog.html">Каталог</a></li>
          <li><a href="about.html">О нас</a></li>
          <li><a href="contacts.html">Контакты</a></li>
          <li><a href="profile.html" class="active">Профиль</a></li>
        </ul>
      </nav>
      <div class="header-icons">
        <a href="profile.html"><i class="fas fa-user"></i></a>
        <a href="cart.html"><i class="fas fa-shopping-cart"></i><span class="cart-badge">0</span></a>
      </div>
    </header>

    <main class="container">
      <h1 class="section-title">
        <span class="title-gradient">Личный кабинет</span>
      </h1>

      <div class="profile-wrapper">
        <div class="profile-sidebar glass">
          <div class="profile-avatar">
            <i class="fas fa-user-circle"></i>
            <h3>Александр Петров</h3>
            <p>alex@example.com</p>
          </div>
          <nav class="profile-nav">
            <button class="profile-nav-btn active" data-tab="info">
              <i class="fas fa-user"></i> Личные данные
            </button>
            <button class="profile-nav-btn" data-tab="orders">
              <i class="fas fa-box"></i> Мои заказы
            </button>
            <button class="profile-nav-btn" data-tab="wishlist">
              <i class="fas fa-heart"></i> Избранное
            </button>
            <button class="profile-nav-btn" data-tab="password">
              <i class="fas fa-key"></i> Смена пароля
            </button>
          </nav>
          <button class="btn btn-outline logout-btn" style="width: 100%;" onclick="showToast('Выход из аккаунта')">Выйти</button>
        </div>

        <div class="profile-content glass">
          <div class="profile-tab active" id="tab-info">
            <h3><i class="fas fa-user"></i> Личная информация</h3>
            <form id="profileForm" class="profile-form">
              <div class="form-row">
                <div class="form-group">
                  <input type="text" id="fullName" placeholder=" " value="Александр Петров">
                  <label for="fullName">Полное имя</label>
                </div>
                <div class="form-group">
                  <input type="email" id="userEmail" placeholder=" " value="alex@example.com">
                  <label for="userEmail">Email</label>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <input type="tel" id="userPhone" placeholder=" " value="+7 (999) 123-45-67">
                  <label for="userPhone">Телефон</label>
                </div>
                <div class="form-group">
                  <input type="text" id="userCity" placeholder=" " value="Москва">
                  <label for="userCity">Город</label>
                </div>
              </div>
              <div class="form-group">
                <textarea id="userAddress" rows="2" placeholder=" ">г. Москва, ул. Примерная, д. 1</textarea>
                <label for="userAddress">Адрес доставки</label>
              </div>
              <button type="submit" class="btn btn-neon">Сохранить изменения</button>
            </form>
          </div>

          <div class="profile-tab" id="tab-orders">
            <h3><i class="fas fa-box"></i> История заказов</h3>
            <div id="ordersList"></div>
          </div>

          <div class="profile-tab" id="tab-wishlist">
            <h3><i class="fas fa-heart"></i> Избранное</h3>
            <div id="wishlistList"></div>
          </div>

          <div class="profile-tab" id="tab-password">
            <h3><i class="fas fa-key"></i> Смена пароля</h3>
            <form id="passwordForm" class="profile-form">
              <div class="form-group">
                <input type="password" id="currentPassword" placeholder=" ">
                <label for="currentPassword">Текущий пароль</label>
              </div>
              <div class="form-group">
                <input type="password" id="newPassword" placeholder=" ">
                <label for="newPassword">Новый пароль</label>
              </div>
              <div class="form-group">
                <input type="password" id="confirmPassword" placeholder=" ">
                <label for="confirmPassword">Подтвердите пароль</label>
              </div>
              <button type="submit" class="btn btn-neon">Изменить пароль</button>
            </form>
          </div>
        </div>
      </div>
    </main>

    <footer class="page-footer">
      <div class="footer-copy">© 2026 GoydaPK | Криворотов М.В, Мартиросов В.В</div>
      <div class="footer-social">
        <a href="#" class="social-icon"><i class="fab fa-vk"></i></a>
        <a href="#" class="social-icon"><i class="fab fa-telegram"></i></a>
        <a href="#" class="social-icon"><i class="fab fa-youtube"></i></a>
      </div>
    </footer>
  </div>

  <script src="javascript.js"></script>
</body>
</html>
